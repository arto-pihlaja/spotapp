services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spotsapp
      POSTGRES_PASSWORD: spotsapp
      POSTGRES_DB: spotsapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    profiles:
      - full
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://spotsapp:spotsapp@db:5432/spotsapp?schema=public
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-32chars
      PORT: 3000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:8081

volumes:
  pgdata:
